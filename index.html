    <!-- PART 8: critical CSS — shell + first paint before bundle (Tailwind/React hydrate separately) -->
    <style id="rathisoft-critical-css">
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        background: #0a0a12;
      }
      body {
        margin: 0;
        background: #0a0a12;
        color: #fff;
        font-family: Inter, system-ui, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        width: 100%;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
      }
      img,
      video {
        max-width: 100%;
        height: auto;
      }
      .page-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        gap: 1rem;
      }
      .page-loader__spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(99, 102, 241, 0.22);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: rathisoft-boot-spin 0.7s linear infinite;
      }
      .page-loader__label {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
      }
      @keyframes rathisoft-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <!-- Core Web Vitals: early connections (fonts, analytics, media CDNs) -->
